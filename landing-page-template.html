<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{title}}</title>
<meta name="description" content="{{metaDescription}}">
<meta name="robots" content="index, follow">

<link rel="canonical" href="https://madkontrollen.dk/landing-pages/{{slug}}/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  margin: 0;
  background: #f5f5f5;
  color: #1f2937;
  line-height: 1.6;
}

.landing-page {
  --theme-primary: {{themePrimary}};
  --theme-secondary: {{themeSecondary}};
  --theme-accent: {{themeAccent}};
  --theme-text: {{themeText}};
  --theme-hero-overlay: rgba(0, 0, 0, 0.42);
}

.baldakin {
  width: 100%;
  height: 100px;
  overflow: hidden;
}

.baldakin-svg {
  width: 100%;
  height: 100%;
  display: block;
}

.hero {
  position: relative;
  min-height: 620px;
  background-image: url('{{heroImage}}');
  background-size: cover;
  background-position: center;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.22),
    var(--theme-hero-overlay)
  );
}

.hero-inner {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  padding: 120px 24px 90px;
  text-align: center;
  color: #ffffff;
}

.hero-logo {
  width: 110px;
  height: 110px;
  margin: 0 auto 20px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.94);
  border: 5px solid var(--theme-primary);
  display: grid;
  place-items: center;
  color: var(--theme-primary);
  font-weight: 800;
  font-size: 28px;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
}

.hero-title {
  margin: 0;
  font-size: clamp(42px, 7vw, 84px);
  line-height: 0.95;
  font-weight: 900;
  letter-spacing: -0.03em;
  text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
}

.hero-subtitle {
  margin: 18px auto 0;
  max-width: 760px;
  font-size: clamp(20px, 2.2vw, 34px);
  line-height: 1.2;
  font-weight: 700;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
}

.hero-actions {
  margin-top: 34px;
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.hero-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 180px;
  padding: 16px 26px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 800;
  font-size: 18px;
  transition: transform 0.18s ease, opacity 0.18s ease;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
}

.hero-btn:hover {
  transform: translateY(-2px);
  opacity: 0.96;
}

.hero-btn--primary {
  background: var(--theme-accent);
  color: #ffffff;
}

.hero-btn--secondary {
  background: var(--theme-secondary);
  color: var(--theme-primary);
}

.hero-btn--ghost {
  background: var(--theme-primary);
  color: #ffffff;
}

.content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 24px;
}

.section {
  margin-bottom: 48px;
  background: #ffffff;
  padding: 32px;
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
}

.section h2 {
  margin: 0 0 16px;
  font-size: 28px;
  font-weight: 800;
  color: var(--theme-primary);
}

.section p {
  margin: 0;
  font-size: 18px;
  line-height: 1.7;
  color: #4b5563;
}

.footer {
  background: var(--theme-primary);
  color: #ffffff;
  padding: 40px 24px;
  text-align: center;
}

.footer-info {
  max-width: 800px;
  margin: 0 auto;
  font-size: 16px;
}

.footer-info p {
  margin: 8px 0;
}

@media (max-width: 768px) {
  .baldakin {
    height: 70px;
  }

  .hero {
    min-height: 520px;
  }

  .hero-inner {
    padding: 108px 18px 72px;
  }

  .hero-actions {
    gap: 10px;
  }

  .hero-btn {
    width: 100%;
    max-width: 320px;
  }

  .content {
    padding: 40px 18px;
  }

  .section {
    padding: 24px;
  }
}
</style>
</head>

<body>

<div class="landing-page">
  <div class="baldakin">
    <svg viewBox="0 0 800 120" preserveAspectRatio="none" class="baldakin-svg">
      <defs>
        <pattern id="awningPattern" width="80" height="120" patternUnits="userSpaceOnUse">
          <rect x="0" y="0" width="40" height="120" fill="{{themePrimary}}"/>
          <rect x="40" y="0" width="40" height="120" fill="{{themeSecondary}}"/>
          <circle cx="20" cy="120" r="40" fill="{{themeSecondary}}"/>
          <circle cx="60" cy="120" r="40" fill="{{themePrimary}}"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#awningPattern)" />
    </svg>
  </div>

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-logo">{{logoInitials}}</div>
      <h1 class="hero-title">{{h1}}</h1>
      <p class="hero-subtitle">{{intro}}</p>
      <div class="hero-actions">
        <a href="/index.html" class="hero-btn hero-btn--primary">Gå til forsiden</a>
        <a href="/index.html#menu" class="hero-btn hero-btn--secondary">Se menu</a>
        {{#if phone}}<a href="tel:{{phone}}" class="hero-btn hero-btn--ghost">Ring nu</a>{{/if}}
        {{#if externalWebsite}}<a href="{{externalWebsite}}" class="hero-btn hero-btn--ghost" target="_blank" rel="noopener">Besøg vores hjemmeside</a>{{/if}}
      </div>
    </div>
  </div>

  <div class="content">
    {{sectionsHtml}}
  </div>

  <footer class="footer">
    <div class="footer-info">
      <p><strong>{{companyName}}</strong></p>
      <p>{{address}}</p>
      <p>Telefon: {{phone}}</p>
      <p style="margin-top:20px;"><a href="/index.html" style="color:#fff;text-decoration:underline;">← Tilbage til forsiden</a></p>
      {{#if externalWebsite}}<p><a href="{{externalWebsite}}" target="_blank" rel="noopener" style="color:#fff;text-decoration:underline;">Besøg vores hjemmeside →</a></p>{{/if}}
    </div>
  </footer>
</div>

</body>
</html>
