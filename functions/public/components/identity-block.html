<div class="identity-block">
    <button class="identity-trigger" id="identityTrigger" aria-label="Åbn brugermenu">
        <div class="identity-avatar" id="identityAvatar"></div>
        <div class="identity-info">
            <div class="identity-name" id="identityName">Ikke logget ind</div>
            <div class="identity-context" id="identityContext"></div>
        </div>
        <svg class="identity-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <div class="identity-menu" id="identityMenu" hidden>
        <a href="/profile.html" class="identity-menu-item">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
                <path d="M3 14C3 11.2386 5.23858 9 8 9C10.7614 9 13 11.2386 13 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Min profil</span>
        </a>
        <a href="/companies.html" class="identity-menu-item">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M5 6H11M5 9H11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Virksomhed</span>
        </a>
        <button class="identity-menu-item" id="switchLocationBtn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 14C8 14 13 10 13 6C13 3.23858 10.7614 1 8 1C5.23858 1 3 3.23858 3 6C3 10 8 14 8 14Z" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="8" cy="6" r="1.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span>Skift lokation</span>
        </button>
        <div class="identity-menu-divider"></div>
        <button class="identity-menu-item identity-menu-item-danger" id="logoutBtn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M6 14H3C2.44772 14 2 13.5523 2 13V3C2 2.44772 2.44772 2 3 2H6M11 11L14 8M14 8L11 5M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Log ud</span>
        </button>
    </div>
</div>

<style>
.identity-block {
    position: relative;
}

.identity-trigger {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px 6px 6px;
    border: 1px solid #d4e3d4;
    border-radius: 12px;
    background: #ffffff;
    cursor: pointer;
    transition: all 0.2s;
}

.identity-trigger:hover {
    background: #f7fbf7;
    border-color: #b8d4b8;
}

.identity-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
    overflow: hidden;
}

.identity-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.identity-info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    min-width: 0;
}

.identity-name {
    font-size: 14px;
    font-weight: 600;
    color: #1f4727;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
}

.identity-context {
    font-size: 12px;
    color: #5e6b5e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
}

.identity-chevron {
    flex-shrink: 0;
    color: #5e6b5e;
    transition: transform 0.2s;
}

.identity-trigger[aria-expanded="true"] .identity-chevron {
    transform: rotate(180deg);
}

.identity-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 220px;
    background: #ffffff;
    border: 1px solid #d4e3d4;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(22, 41, 22, 0.12);
    padding: 8px;
    z-index: 1000;
}

.identity-menu[hidden] {
    display: none;
}

.identity-menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: #234123;
    font-size: 14px;
    font-weight: 500;
    text-align: left;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s;
}

.identity-menu-item:hover {
    background: #f0f7f0;
}

.identity-menu-item svg {
    flex-shrink: 0;
    color: #5e6b5e;
}

.identity-menu-item-danger {
    color: #c62828;
}

.identity-menu-item-danger svg {
    color: #c62828;
}

.identity-menu-item-danger:hover {
    background: #fdeaea;
}

.identity-menu-divider {
    height: 1px;
    background: #e8f3e8;
    margin: 8px 0;
}
</style>

<script type="module">
import { session } from '/core/session.js';
import { auth } from '/core/firebase-config.js';
import { signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

const trigger = document.getElementById('identityTrigger');
const menu = document.getElementById('identityMenu');
const avatar = document.getElementById('identityAvatar');
const nameEl = document.getElementById('identityName');
const contextEl = document.getElementById('identityContext');
const logoutBtn = document.getElementById('logoutBtn');
const switchLocationBtn = document.getElementById('switchLocationBtn');

function updateIdentityBlock(data) {
    const { user, company, location } = data;

    if (!user) {
        avatar.innerHTML = '?';
        nameEl.textContent = 'Ikke logget ind';
        contextEl.textContent = '';
        return;
    }

    if (company?.logoUrl) {
        avatar.innerHTML = `<img src="${company.logoUrl}" alt="${company.name || 'Logo'}">`;
    } else if (user.photoURL) {
        avatar.innerHTML = `<img src="${user.photoURL}" alt="${user.displayName || 'Bruger'}">`;
    } else {
        avatar.textContent = session.getInitials();
    }

    nameEl.textContent = user.displayName || user.email || 'Bruger';

    const contextParts = [];
    if (company?.name) contextParts.push(company.name);
    if (location?.name) contextParts.push(location.name);
    contextEl.textContent = contextParts.join(' · ');
}

session.subscribe(updateIdentityBlock);
updateIdentityBlock({
    user: session.user,
    company: session.company,
    location: session.location
});

trigger.addEventListener('click', () => {
    const isOpen = menu.hidden === false;
    menu.hidden = !isOpen;
    trigger.setAttribute('aria-expanded', !isOpen);
});

document.addEventListener('click', (e) => {
    if (!trigger.contains(e.target) && !menu.contains(e.target)) {
        menu.hidden = true;
        trigger.setAttribute('aria-expanded', 'false');
    }
});

logoutBtn.addEventListener('click', async () => {
    try {
        await signOut(auth);
        window.location.replace('/');
    } catch (error) {
        console.error('Logout error:', error);
    }
});

switchLocationBtn.addEventListener('click', () => {
    menu.hidden = true;
    trigger.setAttribute('aria-expanded', 'false');
    window.location.href = '/locations.html';
});
</script>
