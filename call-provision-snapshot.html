<!DOCTYPE html>
<html>
<head>
    <title>Provision Risk Analysis Snapshot</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyDqVwVJgF6jFHdLCvIlvNWVVqD8Hs-XPQM",
            authDomain: "madkontrollen.firebaseapp.com",
            projectId: "madkontrollen",
            storageBucket: "madkontrollen.firebasestorage.app",
            messagingSenderId: "937588793415",
            appId: "1:937588793415:web:4d7e9c6e8b5f3a2c1d4e5f"
        };
        
        const app = initializeApp(firebaseConfig);
        const functions = getFunctions(app, 'us-central1');
        
        async function provisionSnapshot() {
            const companyId = 'company_1777918459234_s1hq3qv7o';
            const locationId = 'location_1777918459234_me2rtaroj';
            const industry = 'restaurant';
            
            console.log('[provisionSnapshot] Calling function...', { companyId, locationId, industry });
            
            const provisionRiskAnalysisSnapshot = httpsCallable(functions, 'provisionRiskAnalysisSnapshot');
            
            try {
                const result = await provisionRiskAnalysisSnapshot({
                    companyId,
                    locationId,
                    organizationId: companyId,
                    industry,
                    companyName: 'Test Restaurant',
                    profile: {}
                });
                
                console.log('✅ SUCCESS:', result.data);
                document.getElementById('result').innerHTML = `
                    <h2 style="color: green;">✅ SUCCESS</h2>
                    <pre>${JSON.stringify(result.data, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('❌ ERROR:', error);
                document.getElementById('result').innerHTML = `
                    <h2 style="color: red;">❌ ERROR</h2>
                    <pre>${error.message}\n${JSON.stringify(error, null, 2)}</pre>
                `;
            }
        }
        
        window.provisionSnapshot = provisionSnapshot;
    </script>
</head>
<body style="font-family: sans-serif; padding: 40px;">
    <h1>Provision Risk Analysis Snapshot</h1>
    <p><strong>Company ID:</strong> company_1777918459234_s1hq3qv7o</p>
    <p><strong>Location ID:</strong> location_1777918459234_me2rtaroj</p>
    <p><strong>Industry:</strong> restaurant</p>
    
    <button onclick="provisionSnapshot()" style="padding: 12px 24px; font-size: 16px; cursor: pointer;">
        🚀 Provision Snapshot
    </button>
    
    <div id="result" style="margin-top: 30px;"></div>
</body>
</html>
